  <main>
   <section class="hero">
    <div class="container">
     <h1>
      Reset Your Password
     </h1>
    </div>
   </section>
   <section>
    <div class="container">
     <div class="form-container">
      <form id="reset-password-form">
       <input id="reset-token" name="token" type="hidden"/>
       <div class="form-group">
        <label for="new-password">
         New Password
        </label>
        <input autocomplete="new-password" class="form-input" id="new-password" required="" type="password"/>
        <p class="error-message" id="new-password-error">
        </p>
       </div>
       <div class="form-group">
        <label for="confirm-password">
         Confirm New Password
        </label>
        <input autocomplete="new-password" class="form-input" id="confirm-password" required="" type="password"/>
        <p class="error-message" id="confirm-password-error">
        </p>
       </div>
       <button class="button" type="submit">
        Reset Password
       </button>
       <p id="form-message">
       </p>
      </form>
     </div>
    </div>
   </section>

  <script>
   document.addEventListener('DOMContentLoaded', () => {
const resetPasswordForm = document.getElementById('reset-password-form');
const newPasswordInput = document.getElementById('new-password');
const confirmPasswordInput = document.getElementById('confirm-password');
const formMessage = document.getElementById('form-message');
const newPasswordError = document.getElementById('new-password-error');
const confirmPasswordError = document.getElementById('confirm-password-error');
const resetTokenInput = document.getElementById('reset-token');
// Extract token from URL
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');
if (token) {
resetTokenInput.value = token;
} else {
formMessage.textContent = 'Invalid or missing reset token.';
formMessage.style.color = 'red';
resetPasswordForm.querySelector('button[type="submit"]').disabled = true;
// Optionally hide the form or redirect
}
resetPasswordForm.addEventListener('submit', async (e) => {
e.preventDefault();
newPasswordError.textContent = '';
confirmPasswordError.textContent = '';
formMessage.textContent = '';
const newPassword = newPasswordInput.value;
const confirmPassword = confirmPasswordInput.value;
const resetToken = resetTokenInput.value;
if (!newPassword) {
newPasswordError.textContent = 'New password is required.';
return;
}
if (newPassword.length < 8) {
newPasswordError.textContent = 'New password must be at least 8 characters long.';
return;
}
if (newPassword !== confirmPassword) {
confirmPasswordError.textContent = 'Passwords do not match.';
return;
}
try {
const response = await fetch('/api/reset-password', {
method: 'POST',
headers: {
'Content-Type': 'application/json',
},
body: JSON.stringify({ token: resetToken, newPassword }),
});
const data = await response.json();
if (response.ok) {
formMessage.textContent = data.message || 'Your password has been reset successfully. You can now log in.';
formMessage.style.color = 'green';
resetPasswordForm.reset();
// Optionally redirect to login page
setTimeout(() => {
window.location.href = '/auth.html';
}, 3000);
} else {
formMessage.textContent = data.message || 'Failed to reset password. Please try again.';
formMessage.style.color = 'red';
}
} catch (error) {
console.error('Error during password reset:', error);
formMessage.textContent = 'An unexpected error occurred. Please try again.';
formMessage.style.color = 'red';
}
});
});
  </script>
  <script defer="True" src="/js/app.min.js">
  </script>
