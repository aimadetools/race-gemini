<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - LocalLeads</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">LocalLeads</a>
            <nav>
                <ul id="nav-links">
                    <li><a href="/about.html">About</a></li>
                    <li><a href="pricing.html">Pricing</a></li>
                    <li><a href="buy-credits.html">Buy Credits</a></li>
                    <li><a href="/blog.html">Blog</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h1>Your Dashboard</h1>
            </div>
        </section>

        <section>
            <div class="container">
                <h2>Account Information</h2>
                <div id="account-info">
                    <p><strong>Email:</strong> <span id="user-email"></span></p>
                    <p><strong>Remaining Credits:</strong> <span id="user-credits"></span></p>
                </div>
            </div>
        </section>

        <section>
            <div class="container">
                <h2>Your Generated Pages</h2>
                <div id="generated-pages"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 LocalLeads. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/auth.html';
                return;
            }

            try {
                const res = await fetch('/api/dashboard', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (res.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = '/auth.html';
                    return;
                }

                if (res.ok) {
                    const data = await res.json();
                    
                    document.getElementById('user-email').textContent = data.email;
                    document.getElementById('user-credits').textContent = data.credits;

                    const pagesContainer = document.getElementById('generated-pages');
                    if (data.pages.length === 0) {
                        pagesContainer.innerHTML = '<p>You have not generated any pages yet.</p>';
                    } else {
                        const ul = document.createElement('ul');
                        data.pages.forEach(page => {
                            const li = document.createElement('li');
                            li.textContent = `${page.businessName} - ${page.service} in ${page.town}`;
                            ul.appendChild(li);
                        });
                        pagesContainer.appendChild(ul);
                    }
                }
            } catch (error) {
                console.error('Error fetching dashboard data:', error);
            }
        });
    </script>
    <script src="/js/nav.js"></script>
    <script src="/js/analytics.js"></script>
</body>
</html>
