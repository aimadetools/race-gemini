<main>
<section class="hero">
<div class="container">
<h1>
      Login or Create an Account
     </h1>
</div>

<section>
<div class="container">
<div class="auth-forms">
<div class="form-container">
<h2>
        Signup
       </h2>
<form id="signup-form">
<div class="form-group">
<label for="signup-email">
          Email
         </label>
<input autocomplete="email" class="form-input" id="signup-email" required="" type="email"/>
<p class="error-message" id="signup-email-error">
</p>
</div>
<div class="form-group">
<label for="signup-password">
          Password
         </label>
<input autocomplete="new-password" class="form-input" id="signup-password" required="" type="password"/>
<p class="error-message" id="signup-password-error">
</p>
</div>
<button class="button" type="submit">
         Signup
        </button>
<p id="signup-message">
</p>
</form>
</div>
<div class="form-container">
<h2>
        Login
       </h2>
<form id="login-form">
<div class="form-group">
<label for="login-email">
          Email
         </label>
<input autocomplete="email" class="form-input" id="login-email" required="" type="email"/>
<p class="error-message" id="login-email-error">
</p>
</div>
<div class="form-group">
<label for="login-password">
          Password
         </label>
<input autocomplete="current-password" class="form-input" id="login-password" required="" type="password"/>
<p class="error-message" id="login-password-error">
</p>
</div>
<button class="button" type="submit">
         Login
        </button>
<p id="login-message">
</p>

<script>
   document.addEventListener('DOMContentLoaded', () => {
const signupForm = document.getElementById('signup-form');
const signupEmailInput = document.getElementById('signup-email');
const signupPasswordInput = document.getElementById('signup-password');
const signupMessage = document.getElementById('signup-message');
const signupEmailError = document.getElementById('signup-email-error');
const signupPasswordError = document.getElementById('signup-password-error');
signupForm.addEventListener('submit', async (e) => {
e.preventDefault();
signupEmailError.textContent = '';
signupPasswordError.textContent = '';
signupMessage.textContent = '';
const email = signupEmailInput.value;
const password = signupPasswordInput.value;
if (!email) {
signupEmailError.textContent = 'Email is required.';
return;
}
if (!password) {
signupPasswordError.textContent = 'Password is required.';
return;
}
try {
const response = await fetch('/api/signup', {
method: 'POST',
headers: {
'Content-Type': 'application/json',
},
body: JSON.stringify({ email, password }),
});
const data = await response.json();
if (response.ok) {
signupMessage.textContent = data.message;
signupMessage.style.color = 'green';
signupForm.reset();
// Optionally redirect or log in the user
} else {
signupMessage.textContent = data.message || 'Signup failed.';
signupMessage.style.color = 'red';
}
} catch (error) {
console.error('Error during signup:', error);
signupMessage.textContent = 'An unexpected error occurred.';
signupMessage.style.color = 'red';
}
});
// Login form submission handler
const loginForm = document.getElementById('login-form');
const loginEmailInput = document.getElementById('login-email');
const loginPasswordInput = document.getElementById('login-password');
const loginMessage = document.getElementById('login-message');
const loginEmailError = document.getElementById('login-email-error');
const loginPasswordError = document.getElementById('login-password-error');
loginForm.addEventListener('submit', async (e) => {
e.preventDefault();
loginEmailError.textContent = '';
loginPasswordError.textContent = '';
loginMessage.textContent = '';
const email = loginEmailInput.value;
const password = loginPasswordInput.value;
if (!email) {
loginEmailError.textContent = 'Email is required.';
return;
}
if (!password) {
loginPasswordError.textContent = 'Password is required.';
return;
}
try {
const response = await fetch('/api/login', {
method: 'POST',
headers: {
'Content-Type': 'application/json',
},
body: JSON.stringify({ email, password }),
});
const data = await response.json();
if (response.ok) {
loginMessage.textContent = data.message;
loginMessage.style.color = 'green';
loginForm.reset();
// Optionally redirect or update UI for logged-in state
} else {
loginMessage.textContent = data.message || 'Login failed.';
loginMessage.style.color = 'red';
}
} catch (error) {
console.error('Error during login:', error);
loginMessage.textContent = 'An unexpected error occurred.';
loginMessage.style.color = 'red';
}
});
});
  </script>
<script src="/js/app.min.js">
</script>
