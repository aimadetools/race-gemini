<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Referral Dashboard | LocalLeads</title>
    <meta
      content="Track your referrals and earnings with the LocalLeads referral program."
      name="description"
    />
    <link href="style.min.css" rel="stylesheet" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;display=swap"
      rel="stylesheet"
    />
    <link href="/images/favicon.png" rel="icon" type="image/png" />
  </head>
  <body>
    <header>
      <nav>
        <div class="container">
          <a class="logo" href="/">
            <img
              src="/images/logo.svg"
              alt="LocalLeads Logo"
              class="logo-svg"
            />
          </a>
        </div>
      </nav>
    </header>
    <main class="section-padding">
      <h1>Your Referral Dashboard</h1>
      
      <div class="card">
        <h2>Your Unique Referral Link</h2>
        <p>Share this link to start earning commissions.</p>
        <input type="text" id="referralLink" readonly value="https://localleads.pro/signup?ref=YOUR_UNIQUE_CODE" />
        <button id="copyButton">Copy Link</button>
      </div>

      <div class="card">
        <h2>Your Stats</h2>
        <div id="referralStats">
          <p><strong>Clicks:</strong> <span id="clicksCount">0</span></p>
          <p><strong>Signups:</strong> <span id="signupsCount">0</span></p>
          <p><strong>Total Earned:</strong> $<span id="totalEarned">0.00</span></p>
        </div>
      </div>
      
      <div class="card">
        <h2>Referred Users</h2>
        <table id="referredUsersTable">
            <thead>
                <tr>
                    <th>User</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Commission</th>
                </tr>
            </thead>
            <tbody>
                <!-- Rows will be added dynamically -->
            </tbody>
        </table>
      </div>

    </main>
    <footer class="section-padding">
      <div class="container">
        <div class="footer-bottom">
          <p>© 2026 LocalLeads. All rights reserved.</p>
        </div>
      </div>
    </footer>
    <script src="/js/referral-dashboard.js"></script>
  </body>
</html>
