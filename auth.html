<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login / Signup - LocalLeads</title>
<link href="/style.css" rel="stylesheet"/>
</head>
<body>
<header>
<div class="container">
<a class="logo" href="/">LocalLeads</a>
<nav>
<ul id="nav-links">
<li><a href="/about.html">About</a></li>
<li><a href="pricing.html">Pricing</a></li>
<li><a href="buy-credits.html">Buy Credits</a></li>
<li><a href="/blog.html">Blog</a></li>

</ul>
</nav>
</div>
</header>
<main>
<section class="hero">
<div class="container">
<h1>Login or Create an Account</h1>
</div>
</section>
<section>
<div class="container">
<div class="auth-forms">
<div class="form-container">
<h2>Signup</h2>
<form id="signup-form">
<div class="form-group">
<label for="signup-email">Email</label>
<input class="form-input" id="signup-email" required="" type="email"/>
<p class="error-message" id="signup-email-error"></p>
</div>
<div class="form-group">
<label for="signup-password">Password</label>
<input class="form-input" id="signup-password" required="" type="password"/>
<p class="error-message" id="signup-password-error"></p>
</div>
<button class="button" type="submit">Signup</button>
<p id="signup-message"></p>
</form>
</div>
<div class="form-container">
<h2>Login</h2>
<form id="login-form">
<div class="form-group">
<label for="login-email">Email</label>
<input class="form-input" id="login-email" required="" type="email"/>
<p class="error-message" id="login-email-error"></p>
</div>
<div class="form-group">
<label for="login-password">Password</label>
<input class="form-input" id="login-password" required="" type="password"/>
<p class="error-message" id="login-password-error"></p>
</div>
<button class="button" type="submit">Login</button>
<p id="login-message"></p>
</form>
</div>
</div>
</div>
</section>
</main>
<div class="sticky-cta-bar">
    <p>Ready to get more local customers?</p>
    <a class="button" href="generate.html">Generate Pages Now</a>
    <a class="button button-secondary" href="audit.html">Get Free Audit</a>
</div>
<footer>
    <div class="container">
        <p>&copy; 2026 LocalLeads. All rights reserved.</p>
    </div>
</footer>
<script src="/js/nav.js"></script>
<script src="/js/analytics.js"></script>
<script src="/js/scroll-to-top.js"></script>
</body>
</html>
