<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - LocalLeads</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo">LocalLeads</a>
            <nav>
                <ul>
                    <li><a href="/about.html">About</a></li>
                    <li><a href="/pricing.html">Pricing</a></li>
                    <li><a href="/blog.html">Blog</a></li>
                    <li><a href="#" id="logout-button" class="button">Logout</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h1>Your Dashboard</h1>
            </div>
        </section>

        <section>
            <div class="container">
                <h2>Your Generated Pages</h2>
                <div id="generated-pages"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 LocalLeads. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/auth.html';
                return;
            }

            try {
                const res = await fetch('/api/dashboard', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (res.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = '/auth.html';
                    return;
                }

                if (res.ok) {
                    const pages = await res.json();
                    const pagesContainer = document.getElementById('generated-pages');
                    if (pages.length === 0) {
                        pagesContainer.innerHTML = '<p>You have not generated any pages yet.</p>';
                    } else {
                        const ul = document.createElement('ul');
                        pages.forEach(page => {
                            const li = document.createElement('li');
                            li.textContent = `${page.business_name} - ${page.zip_code}`;
                            ul.appendChild(li);
                        });
                        pagesContainer.appendChild(ul);
                    }
                }
            } catch (error) {
                console.error('Error fetching dashboard data:', error);
            }
        });

        document.getElementById('logout-button').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('token');
            window.location.href = '/';
        });
    </script>
</body>
</html>
