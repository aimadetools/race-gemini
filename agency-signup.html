<main>
<section class="auth-form">
<h2>
     Agency Signup
    </h2>
<form id="agency-signup-form">
<div class="form-group">
<label for="agency-name">
       Agency Name
      </label>
<input autocomplete="organization" id="agency-name" name="agency-name" required="" type="text"/>
</div>
<div class="form-group">
<label for="email">
       Email
      </label>
<input autocomplete="email" id="email" name="email" required="" type="email"/>
</div>
<div class="form-group">
<label for="password">
       Password
      </label>
<input autocomplete="new-password" id="password" name="password" required="" type="password"/>
</div>
<div class="form-group">
<button class="button" type="submit">
       Sign Up
      </button>
</div>
</form>
<p class="error-message" id="error-message">
</p>
</section>
</main>
<footer>
<div class="container">
<p>
     © 2026 LocalLeads. All rights reserved.
    </p>
</div>
</footer>
<script>
   const form = document.getElementById('agency-signup-form');
const errorMessage = document.getElementById('error-message');
form.addEventListener('submit', async (e) => {
e.preventDefault();
errorMessage.textContent = '';
const agencyName = document.getElementById('agency-name').value;
const email = document.getElementById('email').value;
const password = document.getElementById('password').value;
const response = await fetch('/api/agency-signup', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ agencyName, email, password }),
});
if (response.ok) {
window.location.href = 'agency-dashboard.html';
} else {
const { message } = await response.json();
errorMessage.textContent = message;
}
});
  </script>
<script src="/js/app.min.js">
</script>
<button id="scrollToTopBtn" title="Go to top"><i class="fas fa-arrow-up"></i></button>
