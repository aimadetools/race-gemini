 <head>

 </head>
 <body>

  </div>
  <header>
   <nav>
    <div class="container">
     <a class="logo" href="/">
      LocalLeads
     </a>
     <div class="hamburger-menu" id="hamburger-icon">
      <div class="bar">
      </div>
      <div class="bar">
      </div>
      <div class="bar">
      </div>
     </div>
     <ul class="nav-links" id="nav-menu">
      <li class="close-menu-li">
       <button id="close-menu-btn">
        ×
       </button>
      </li>
      <li>
       <a href="/generate.html">
        Generate Pages
       </a>
      </li>
      <li>
       <a href="/pricing.html">
        Pricing
       </a>
      </li>
      <li>
       <a href="/blog.html">
        Blog
       </a>
      </li>
      <li>
       <a href="/about.html">
        About
       </a>
      </li>
      <li>
       <a href="/audit.html">
        Free Audit
       </a>
      </li>
      <li>
       <a href="/contact.html">
        Contact
       </a>
      </li>
      <li>
       <a href="/auth.html">
        Login/Signup
       </a>
      </li>
      <li>
       <a href="/buy-credits.html">
        Buy Credits
       </a>
      </li>
     </ul>
    </div>
   </nav>
  </header>
  <main>
   <section class="hero">
    <div class="container">
     <h1>
      Agency Login
     </h1>
    </div>
   </section>
   <section>
    <div class="container">
     <div class="auth-forms">
      <div class="form-container">
       <h2>
        Login
       </h2>
       <form id="login-form">
        <div class="form-group">
         <label for="login-email">
          Email
         </label>
         <input autocomplete="email" class="form-input" id="login-email" required="" type="email"/>
         <p class="error-message" id="login-email-error">
         </p>
        </div>
        <div class="form-group">
         <label for="login-password">
          Password
         </label>
         <input autocomplete="current-password" class="form-input" id="login-password" required="" type="password"/>
         <p class="error-message" id="login-password-error">
         </p>
        </div>
        <button class="button" type="submit">
         Login
        </button>
        <p id="login-message">
        </p>
        <p class="forgot-password-link">
         <a href="/forgot-password.html?type=agency">
          Forgot Password?
         </a>
        </p>
       </form>
      </div>
     </div>
    </div>
   </section>
  </main>
  <div class="sticky-cta-bar">
   <p>
    Ready to get more local customers?
   </p>
   <a class="button" href="generate.html">
    Generate Pages Now
   </a>
   <a class="button button-secondary" href="audit.html">
    Get Free Audit
   </a>
  </div>
  <footer>
   <div class="container">
    <p>
     © 2026 LocalLeads. All rights reserved.
    </p>
   </div>
  </footer>
  <script>
   document.addEventListener('DOMContentLoaded', () => {
const loginForm = document.getElementById('login-form');
const loginEmailInput = document.getElementById('login-email');
const loginPasswordInput = document.getElementById('login-password');
const loginMessage = document.getElementById('login-message');
const loginEmailError = document.getElementById('login-email-error');
const loginPasswordError = document.getElementById('login-password-error');
loginForm.addEventListener('submit', async (e) => {
e.preventDefault();
loginEmailError.textContent = '';
loginPasswordError.textContent = '';
loginMessage.textContent = '';
const email = loginEmailInput.value;
const password = loginPasswordInput.value;
if (!email) {
loginEmailError.textContent = 'Email is required.';
return;
}
if (!password) {
loginPasswordError.textContent = 'Password is required.';
return;
}
try {
const response = await fetch('/api/agency-login', {
method: 'POST',
headers: {
'Content-Type': 'application/json',
},
body: JSON.stringify({ email, password }),
});
const data = await response.json();
if (response.ok) {
loginMessage.textContent = data.message;
loginMessage.style.color = 'green';
loginForm.reset();
window.location.href = '/agency-dashboard.html';
} else {
loginMessage.textContent = data.message || 'Login failed.';
loginMessage.style.color = 'red';
}
} catch (error) {
console.error('Error during login:', error);
loginMessage.textContent = 'An unexpected error occurred.';
loginMessage.style.color = 'red';
}
});
});
  </script>
  <script src="/js/app.js">
  </script>
 </body>
</html>
