<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login / Signup - LocalLeads</title>
<link href="/style.css" rel="stylesheet"/>
</head>
<body>
<header>
<div class="container">
<a class="logo" href="/">LocalLeads</a>
<nav>
<ul id="nav-links">
<li><a href="/about.html">About</a></li>
<li><a href="/pricing.html">Pricing</a></li>
<li><a href="/blog.html">Blog</a></li>

</ul>
</nav>
</div>
</header>
<main>
<section class="hero">
<div class="container">
<h1>Login or Create an Account</h1>
</div>
</section>
<section>
<div class="container">
<div class="auth-forms">
<div class="form-container">
<h2>Signup</h2>
<form id="signup-form">
<div class="form-group">
<label for="signup-email">Email</label>
<input id="signup-email" required="" type="email"/>
</div>
<div class="form-group">
<label for="signup-password">Password</label>
<input id="signup-password" required="" type="password"/>
</div>
<button class="button" type="submit">Signup</button>
<p id="signup-message"></p>
</form>
</div>
<div class="form-container">
<h2>Login</h2>
<form id="login-form">
<div class="form-group">
<label for="login-email">Email</label>
<input id="login-email" required="" type="email"/>
</div>
<div class="form-group">
<label for="login-password">Password</label>
<input id="login-password" required="" type="password"/>
</div>
<button class="button" type="submit">Login</button>
<p id="login-message"></p>
</form>
</div>
</div>
</div>
</section>
</main>
<footer>
<div class="container">
<p>© 2026 LocalLeads. All rights reserved.</p>
</div>
</footer>
<script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const messageEl = document.getElementById('signup-message');

            try {
                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    messageEl.textContent = 'Signup successful! You can now login.';
                    messageEl.style.color = 'green';
                } else {
                    messageEl.textContent = data.message;
                    messageEl.style.color = 'red';
                }
            } catch (error) {
                messageEl.textContent = 'An error occurred. Please try again.';
                messageEl.style.color = 'red';
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const messageEl = document.getElementById('login-message');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    window.location.href = '/dashboard.html';
                } else {
                    messageEl.textContent = data.message;
                    messageEl.style.color = 'red';
                }
            } catch (error) {
                messageEl.textContent = 'An error occurred. Please try again.';
                messageEl.style.color = 'red';
            }
        });
    </script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const navLinks = document.getElementById('nav-links');
    const token = localStorage.getItem('token');

    if (token) {
        const dashboardLi = document.createElement('li');
        dashboardLi.innerHTML = '<a href="/dashboard.html">Dashboard</a>';
        navLinks.appendChild(dashboardLi);

        const logoutLi = document.createElement('li');
        logoutLi.innerHTML = '<a href="#" id="logout-link">Logout</a>';
        navLinks.appendChild(logoutLi);

        const logoutLink = document.getElementById('logout-link');
        logoutLink.addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('token');
            localStorage.removeItem('userId');
            window.location.href = '/auth.html';
        });
    } else {
        const loginLi = document.createElement('li');
        loginLi.innerHTML = '<a href="/auth.html">Login/Signup</a>';
        navLinks.appendChild(loginLi);
    }
});
</script></body>
</html>
