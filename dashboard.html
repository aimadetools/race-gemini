<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dashboard - LocalLeads</title>
<link href="/style.css" rel="stylesheet"/>
</head>
<body>
<header>
<div class="container">
<a class="logo" href="/">LocalLeads</a>
<nav>
<ul id="nav-links">
<li><a href="/about.html">About</a></li>
<li><a href="/pricing.html">Pricing</a></li>
<li><a href="/blog.html">Blog</a></li>
<li><a class="button" href="#" id="logout-button">Logout</a></li>
</ul>
</nav>
</div>
</header>
<main>
<section class="hero">
<div class="container">
<h1>Your Dashboard</h1>
</div>
</section>
<section>
<div class="container">
<h2>Your Generated Pages</h2>
<div id="generated-pages"></div>
</div>
</section>
</main>
<footer>
<div class="container">
<p>© 2026 LocalLeads. All rights reserved.</p>
</div>
</footer>
<script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/auth.html';
                return;
            }

            try {
                const res = await fetch('/api/dashboard', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (res.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = '/auth.html';
                    return;
                }

                if (res.ok) {
                    const pages = await res.json();
                    const pagesContainer = document.getElementById('generated-pages');
                    if (pages.length === 0) {
                        pagesContainer.innerHTML = '<p>You have not generated any pages yet.</p>';
                    } else {
                        const ul = document.createElement('ul');
                        pages.forEach(page => {
                            const li = document.createElement('li');
                            li.textContent = `${page.business_name} - ${page.zip_code}`;
                            ul.appendChild(li);
                        });
                        pagesContainer.appendChild(ul);
                    }
                }
            } catch (error) {
                console.error('Error fetching dashboard data:', error);
            }
        });

        document.getElementById('logout-button').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('token');
            window.location.href = '/';
        });
    </script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const navLinks = document.getElementById('nav-links');
    const token = localStorage.getItem('token');

    if (token) {
        const dashboardLi = document.createElement('li');
        dashboardLi.innerHTML = '<a href="/dashboard.html">Dashboard</a>';
        navLinks.appendChild(dashboardLi);

        const logoutLi = document.createElement('li');
        logoutLi.innerHTML = '<a href="#" id="logout-link">Logout</a>';
        navLinks.appendChild(logoutLi);

        const logoutLink = document.getElementById('logout-link');
        logoutLink.addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('token');
            localStorage.removeItem('userId');
            window.location.href = '/auth.html';
        });
    } else {
        const loginLi = document.createElement('li');
        loginLi.innerHTML = '<a href="/auth.html">Login/Signup</a>';
        navLinks.appendChild(loginLi);
    }
});
</script></body>
</html>
